<!--
  Brand Properties email signature — corrected, paste-safe HTML snippet
  ===================================================================
  Paste this into the Gmail / Outlook / Apple Mail signature editor.
  Logo is a SINGLE hosted PNG over HTTPS — NO base64, NO SVG.
  Rationale (verified against caniemail.com raw data, 2026-06-15):
    - Gmail (web + iOS + Android) does NOT render base64 data: URIs  -> base64 logo = broken
    - New Outlook for Windows does NOT render base64                 -> base64 logo = broken
    - Gmail web does NOT render SVG; Gmail mobile only on non-Google accounts
    - Microsoft retired inline SVG in Outlook.com + new Outlook (Sep-Oct 2025)
    - A hosted PNG over https renders in ALL of the above + Apple Mail + classic Outlook.

  Template variables (replace before use):
    {{NAME}}          person's full name              e.g. Hannah Gomez
    {{TITLE}}         job title                       e.g. Marketing Coordinator
    {{TAGLINE}}       tagline                         e.g. Management | Leasing | Advisory
    {{ADDR1}}         street address                  e.g. 6224 Sugarloaf Parkway, Suite 200
    {{ADDR2}}         city, state ZIP                 e.g. Duluth, GA 30097
    {{DIRECT_PHONE}}  direct phone, display format    e.g. 770-497-6482
    {{DIRECT_DIGITS}} direct phone, E.164 for tel:    e.g. +17704976482
    {{MOBILE_PHONE}}  mobile phone, display format    e.g. 404-307-1955
    {{MOBILE_DIGITS}} mobile phone, E.164 for tel:    e.g. +14043071955
    {{SITE_URL}}      absolute https site URL         e.g. https://www.brandproperties.com/
    {{LOGO_URL_2X}}   absolute https URL to a transparent PNG
                      (export at 1x = the display size, e.g. 250x44; intrinsic px MUST
                       equal display px so forwards that strip width/height don't blow it up.
                       Bake ~16px transparent padding ABOVE the wordmark — Outlook Classic
                       shears ~8-10px off the top of the image and the cushion absorbs it.)

  Dark mode: the <style> block below is a BEST-EFFORT progressive enhancement.
  Apple Mail (and some Outlook desktop) keep it and swap navy -> lighter blue on a
  dark canvas. Gmail / Outlook.com strip <style> on paste, so the inline #01426A is
  the fallback there. There is NO inline equivalent for prefers-color-scheme.
-->
<style>@media (prefers-color-scheme:dark){.bp-navy{color:#6FA8DC !important;}}</style>
<!--[if mso]><style>a,a:link,a:visited{text-decoration:none !important;color:#01426A !important;}</style><![endif]-->
